<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="思考OS">
<title>思考OS：具体⇔抽象トレーニング</title>
<style>
  :root {
    --primary: #1a1a2e;
    --accent: #e94560;
    --accent2: #0f3460;
    --accent3: #533483;
    --gold: #f5a623;
    --bg: #0d0d1a;
    --card: #1e1e30;
    --card2: #252540;
    --text: #e8e8f0;
    --muted: #888aaa;
    --border: #333355;
    --success: #4CAF50;
    --warn: #FF9800;
    --lvl1: #4fc3f7;
    --lvl2: #a5d6a7;
    --lvl3: #ffcc80;
    --lvl4: #ce93d8;
    --lvl5: #f48fb1;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
  }

  /* ── screens ── */
  .screen { display: none; min-height: 100vh; padding: 0; }
  .screen.active { display: flex; flex-direction: column; }

  /* ── HOME ── */
  #screen-home {
    background: linear-gradient(160deg, #0d0d1a 0%, #1a1a2e 50%, #0f2040 100%);
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }

  .home-top {
    padding: 24px 20px 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .home-title { font-size: 13px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .streak-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(245,166,35,0.15); border: 1px solid rgba(245,166,35,0.4);
    padding: 6px 12px; border-radius: 20px;
    font-size: 13px; font-weight: 700; color: var(--gold);
  }

  .home-hero {
    text-align: center;
    padding: 32px 20px 24px;
  }
  .hero-icon { font-size: 64px; margin-bottom: 12px; }
  .hero-title {
    font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 0%, #a0aac0 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .hero-sub { font-size: 14px; color: var(--muted); line-height: 1.6; }

  .today-card {
    margin: 0 16px 20px;
    background: linear-gradient(135deg, var(--accent) 0%, #c0392b 100%);
    border-radius: 16px; padding: 18px 20px;
    display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 8px 24px rgba(233,69,96,0.35);
  }
  .today-label { font-size: 12px; opacity: 0.85; margin-bottom: 4px; }
  .today-text { font-size: 18px; font-weight: 700; }
  .today-done {
    background: rgba(255,255,255,0.2); border-radius: 20px;
    padding: 6px 14px; font-size: 13px; font-weight: 600;
  }

  .level-section { padding: 0 16px; flex: 1; }
  .section-label {
    font-size: 11px; letter-spacing: 2px; color: var(--muted);
    text-transform: uppercase; margin-bottom: 12px;
  }
  .level-grid { display: flex; flex-direction: column; gap: 10px; }

  .level-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative; overflow: hidden;
  }
  .level-card:active { transform: scale(0.98); }
  .level-card.locked { opacity: 0.45; cursor: not-allowed; }
  .level-card.completed { border-color: var(--success); }
  .level-card::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 4px; height: 100%;
  }
  .level-card[data-level="1"]::before { background: var(--lvl1); }
  .level-card[data-level="2"]::before { background: var(--lvl2); }
  .level-card[data-level="3"]::before { background: var(--lvl3); }
  .level-card[data-level="4"]::before { background: var(--lvl4); }
  .level-card[data-level="5"]::before { background: var(--lvl5); }

  .level-num {
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800; flex-shrink: 0;
  }
  .level-info { flex: 1; }
  .level-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
  .level-desc { font-size: 12px; color: var(--muted); }
  .level-prog { margin-top: 6px; display: flex; align-items: center; gap: 8px; }
  .prog-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .prog-text { font-size: 11px; color: var(--muted); }
  .level-lock { font-size: 18px; }

  .home-footer { padding: 16px 16px env(safe-area-inset-bottom); }
  .stats-row { display: flex; gap: 10px; }
  .stat-card {
    flex: 1; background: var(--card); border-radius: 12px;
    padding: 12px; text-align: center;
  }
  .stat-num { font-size: 22px; font-weight: 800; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── TRAINING ── */
  #screen-train {
    background: var(--bg);
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }

  .train-header {
    display: flex; align-items: center;
    padding: 16px 16px 8px; gap: 12px;
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--card); border: none;
    color: var(--text); font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .train-header-info { flex: 1; }
  .train-level-badge {
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    opacity: 0.8; margin-bottom: 3px;
  }
  .train-header-title { font-size: 16px; font-weight: 700; }

  .timer-ring {
    width: 52px; height: 52px;
    position: relative; flex-shrink: 0;
  }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring .bg { stroke: var(--border); fill: none; }
  .timer-ring .progress { fill: none; transition: stroke-dashoffset 1s linear; }
  .timer-label {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 13px; font-weight: 700;
  }

  .q-progress-bar {
    height: 3px; background: var(--border); margin: 0 16px 16px;
    border-radius: 2px; overflow: hidden;
  }
  .q-progress-fill { height: 100%; transition: width 0.4s; }

  .train-body { flex: 1; overflow-y: auto; padding: 0 16px; }

  .q-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
  }
  .q-type-badge {
    padding: 4px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .q-num { font-size: 13px; color: var(--muted); }

  .q-card {
    background: var(--card); border-radius: 16px;
    padding: 20px; margin-bottom: 16px;
    border: 1px solid var(--border);
  }
  .q-scenario-label {
    font-size: 11px; color: var(--muted); letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 10px;
  }
  .q-scenario {
    background: var(--card2); border-radius: 10px;
    padding: 14px; margin-bottom: 14px;
    font-size: 14px; line-height: 1.7; color: #ccd;
  }
  .q-scenario .pill {
    display: inline-block;
    background: rgba(255,255,255,0.1);
    border-radius: 6px; padding: 2px 8px;
    font-size: 12px; margin: 4px 4px 4px 0;
    font-style: normal;
  }
  .q-text { font-size: 16px; font-weight: 700; line-height: 1.5; }
  .q-hint { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.5; }

  .answer-area {
    background: var(--card); border-radius: 16px;
    padding: 16px; margin-bottom: 14px;
    border: 1px solid var(--border);
  }
  .answer-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .answer-input {
    width: 100%; min-height: 100px;
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px;
    color: var(--text); font-size: 14px; line-height: 1.6;
    resize: none; font-family: inherit;
    transition: border-color 0.2s;
  }
  .answer-input:focus { outline: none; border-color: var(--accent); }

  .reveal-btn {
    width: 100%; padding: 13px;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 12px; color: var(--muted);
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; margin-bottom: 10px;
  }
  .reveal-btn:active { background: var(--card); }

  .answer-reveal {
    display: none; background: var(--card);
    border-radius: 16px; padding: 16px;
    border: 1px solid var(--border);
    margin-bottom: 14px;
  }
  .answer-reveal.show { display: block; }
  .reveal-header { font-size: 12px; color: var(--gold); font-weight: 700; margin-bottom: 10px; }
  .reveal-text { font-size: 14px; line-height: 1.7; }
  .reveal-key {
    background: rgba(245,166,35,0.1); border-radius: 8px;
    padding: 10px 12px; margin-top: 10px;
    font-size: 13px; color: var(--gold);
    border-left: 3px solid var(--gold);
  }
  .reveal-key-label { font-size: 11px; color: var(--gold); opacity: 0.7; margin-bottom: 4px; }

  .self-assess { margin-bottom: 16px; }
  .assess-label { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 10px; }
  .assess-btns { display: flex; gap: 8px; }
  .assess-btn {
    flex: 1; padding: 12px 6px;
    border-radius: 12px; border: 1.5px solid var(--border);
    background: var(--card); color: var(--text);
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; text-align: center;
  }
  .assess-btn.ok { border-color: var(--success); color: var(--success); }
  .assess-btn.so { border-color: var(--warn); color: var(--warn); }
  .assess-btn.no { border-color: var(--muted); }
  .assess-btn:active { transform: scale(0.96); }

  .next-btn {
    display: none; width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent) 0%, #c0392b 100%);
    border: none; border-radius: 14px;
    color: #fff; font-size: 16px; font-weight: 700;
    cursor: pointer; margin-bottom: 16px;
    box-shadow: 0 6px 20px rgba(233,69,96,0.4);
    transition: all 0.2s;
  }
  .next-btn:active { transform: scale(0.98); }
  .next-btn.show { display: block; }

  /* ── COMPLETE ── */
  #screen-complete {
    background: linear-gradient(160deg, #0d0d1a, #1a1a2e, #0f2040);
    align-items: center; justify-content: center;
    text-align: center; padding: 40px 24px;
  }
  .complete-icon { font-size: 72px; margin-bottom: 16px; }
  .complete-title { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
  .complete-sub { font-size: 15px; color: var(--muted); margin-bottom: 32px; line-height: 1.6; }
  .complete-stats {
    display: flex; gap: 16px; margin-bottom: 32px; width: 100%;
    justify-content: center;
  }
  .c-stat {
    background: var(--card); border-radius: 14px;
    padding: 16px 20px; flex: 1; max-width: 120px;
  }
  .c-stat-num { font-size: 28px; font-weight: 800; }
  .c-stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .complete-msg {
    background: var(--card); border-radius: 14px;
    padding: 16px 20px; width: 100%; margin-bottom: 32px;
    text-align: left; border-left: 4px solid var(--accent);
  }
  .complete-msg-label { font-size: 11px; color: var(--accent); font-weight: 700; margin-bottom: 6px; }
  .complete-msg-text { font-size: 14px; line-height: 1.7; color: #ccd; }
  .home-btn {
    width: 100%; padding: 16px;
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: 14px; color: var(--text);
    font-size: 16px; font-weight: 700; cursor: pointer;
  }

  /* ── INTRO ── */
  #screen-intro {
    background: linear-gradient(160deg, #0d0d1a, #1a1a2e);
    padding: 32px 20px;
    align-items: center; justify-content: center;
    text-align: center;
  }
  .intro-icon { font-size: 56px; margin-bottom: 20px; }
  .intro-level-label {
    font-size: 11px; letter-spacing: 2px; color: var(--muted);
    text-transform: uppercase; margin-bottom: 8px;
  }
  .intro-title { font-size: 26px; font-weight: 800; margin-bottom: 12px; }
  .intro-sub { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 28px; }
  .intro-points { width: 100%; margin-bottom: 32px; }
  .intro-point {
    background: var(--card); border-radius: 12px;
    padding: 12px 16px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px;
    text-align: left;
  }
  .intro-point-icon { font-size: 22px; }
  .intro-point-text { font-size: 14px; line-height: 1.5; }
  .start-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--accent), #c0392b);
    border: none; border-radius: 14px;
    color: #fff; font-size: 17px; font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(233,69,96,0.4);
  }

  /* utility */
  .hidden { display: none !important; }
  .bounce { animation: bounce 0.4s ease; }
  @keyframes bounce {
    0%,100%{transform:scale(1)} 50%{transform:scale(1.15)}
  }
</style>
</head>
<body>

<!-- ▼ HOME SCREEN -->
<div id="screen-home" class="screen active">
  <div class="home-top">
    <div class="home-title">思考OS</div>
    <div class="streak-badge">🔥 <span id="streak-count">0</span>日連続</div>
  </div>

  <div class="home-hero">
    <div class="hero-icon">🧠</div>
    <div class="hero-title">具体⇔抽象<br>営業トレーニング</div>
    <div class="hero-sub">飲食店・サービス業向け<br>1日5分で思考力を鍛える</div>
  </div>

  <div class="today-card" id="today-card" onclick="startToday()">
    <div>
      <div class="today-label">今日のトレーニング</div>
      <div class="today-text" id="today-text">タップして開始</div>
    </div>
    <div class="today-done" id="today-done">▶ 開始</div>
  </div>

  <div class="level-section">
    <div class="section-label">レベル一覧</div>
    <div class="level-grid" id="level-grid"></div>
  </div>

  <div class="home-footer">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="total-q">0</div>
        <div class="stat-label">累計問題数</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="total-days">0</div>
        <div class="stat-label">学習日数</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="max-level">1</div>
        <div class="stat-label">到達レベル</div>
      </div>
    </div>
  </div>
</div>

<!-- ▼ INTRO SCREEN -->
<div id="screen-intro" class="screen">
  <div class="intro-icon" id="intro-icon">🎯</div>
  <div class="intro-level-label" id="intro-level-label">LEVEL 1</div>
  <div class="intro-title" id="intro-title">本質を掴む</div>
  <div class="intro-sub" id="intro-sub">説明テキスト</div>
  <div class="intro-points" id="intro-points"></div>
  <button class="start-btn" onclick="startTraining()">トレーニング開始 →</button>
</div>

<!-- ▼ TRAINING SCREEN -->
<div id="screen-train" class="screen">
  <div class="train-header">
    <button class="back-btn" onclick="confirmBack()">‹</button>
    <div class="train-header-info">
      <div class="train-level-badge" id="train-level-label">LEVEL 1</div>
      <div class="train-header-title" id="train-level-title">本質を掴む</div>
    </div>
    <div class="timer-ring">
      <svg width="52" height="52" viewBox="0 0 52 52">
        <circle class="bg" cx="26" cy="26" r="22" stroke-width="4"/>
        <circle id="timer-circle" class="progress" cx="26" cy="26" r="22"
          stroke-width="4" stroke-dasharray="138.2" stroke-dashoffset="0" stroke="var(--accent)"/>
      </svg>
      <div class="timer-label" id="timer-label">5:00</div>
    </div>
  </div>

  <div class="q-progress-bar">
    <div class="q-progress-fill" id="q-prog-fill" style="width:0%"></div>
  </div>

  <div class="train-body" id="train-body"></div>
</div>

<!-- ▼ COMPLETE SCREEN -->
<div id="screen-complete" class="screen">
  <div class="complete-icon" id="complete-icon">🎉</div>
  <div class="complete-title" id="complete-title">セッション完了！</div>
  <div class="complete-sub" id="complete-sub">お疲れ様でした</div>
  <div class="complete-stats">
    <div class="c-stat">
      <div class="c-stat-num" id="c-ok">0</div>
      <div class="c-stat-label">できた✅</div>
    </div>
    <div class="c-stat">
      <div class="c-stat-num" id="c-so">0</div>
      <div class="c-stat-label">まあまあ🔶</div>
    </div>
    <div class="c-stat">
      <div class="c-stat-num" id="c-no">0</div>
      <div class="c-stat-label">もう一回🔁</div>
    </div>
  </div>
  <div class="complete-msg" id="complete-msg">
    <div class="complete-msg-label">今日のポイント</div>
    <div class="complete-msg-text" id="complete-msg-text"></div>
  </div>
  <button class="home-btn" onclick="goHome()">ホームに戻る</button>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DATA
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const LEVELS = [
  {
    id: 1,
    name: '本質を掴む',
    tag: '具体 → 抽象',
    color: 'var(--lvl1)',
    icon: '🔍',
    emoji: '🔍',
    unlock: 0,  // always unlocked
    intro: {
      sub: '2つの具体的な事例から「共通する本質」を一言で言い表す練習です。営業では、お客様の言葉の裏にある本当の課題を見抜く力が問われます。',
      points: [
        { icon: '👁', text: '2つの具体例を見て、共通する「本質」を探す' },
        { icon: '💡', text: '「要するに何が問題か？」を一言で言えるように' },
        { icon: '🎯', text: '飲食店オーナーの悩みを言語化する練習' },
      ]
    },
    questions: [
      {
        type: '共通点探し',
        scenario: ['「毎月、店長がLINEでスタッフ一人ひとりにシフト確認をしている」', '「スタッフが給料明細を毎回もらいに店に来ないといけない」'],
        q: 'この2つの課題に共通する「本質的な問題」を一言で言ってください',
        hint: '💡 誰が何に時間を奪われているか？何が非効率の根本か？',
        answer: '本来不要な作業が属人化・アナログ化されており、経営資源（時間）が無駄に消費されている状態です。',
        key: '抽象化キーワード：「情報伝達の非効率」「アナログ業務の属人化」「生産性の損失」'
      },
      {
        type: '共通点探し',
        scenario: ['「ピーク時に人手が足りなくて毎回バタバタする」', '「閑散期にスタッフが多すぎて人件費が無駄になっている」'],
        q: 'この2つの状況に共通する経営課題を一言で表してください',
        hint: '💡 需要と人員の関係性に注目してみましょう',
        answer: '需要変動に対して人員配置が最適化されていない「需給ミスマッチ」の状態です。シフト管理の精度が低いことが根本原因です。',
        key: '抽象化キーワード：「需給ミスマッチ」「最適配置の欠如」「シフト精度の低さ」'
      },
      {
        type: '共通点探し',
        scenario: ['「スタッフが急に休んで代わりが見つからない」', '「予約のキャンセルが多くて仕込みが無駄になった」'],
        q: 'オーナーの視点でこの2つを抽象化すると、どんなリスクですか？',

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

let state = {
  progress: {}, // { levelId: { completed: [qIdx,...], ok:0, so:0, no:0 } }
  streak: 0,
  lastDate: null,
  totalQ: 0,
  totalDays: 0,
  maxLevel: 1
};

let session = {
  levelId: 1,
  questions: [],
  current: 0,
  scores: { ok: 0, so: 0, no: 0 },
  timerInterval: null,
  seconds: 300
};

function loadState() {
  const s = localStorage.getItem('xshop_train_v2');
  if (s) state = JSON.parse(s);
  // ensure all levels have progress
  LEVELS.forEach(l => {
    if (!state.progress[l.id]) state.progress[l.id] = { completed: [], ok: 0, so: 0, no: 0 };
  });
}

function saveState() {
  localStorage.setItem('xshop_train_v2', JSON.stringify(state));
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// STREAK
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function checkAndUpdateStreak() {
  const today = todayStr();
  if (state.lastDate === today) return; // already trained today
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  if (state.lastDate === yesterday) {
    state.streak++;
  } else if (state.lastDate !== today) {
    state.streak = 1;
  }
  state.lastDate = today;
  state.totalDays++;
  saveState();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// HOME
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function renderHome() {
  document.getElementById('streak-count').textContent = state.streak;
  document.getElementById('total-q').textContent = state.totalQ;
  document.getElementById('total-days').textContent = state.totalDays;
  document.getElementById('max-level').textContent = state.maxLevel;

  // today card
  const todayTrained = state.lastDate === todayStr();
  const nextLevel = getNextLevel();
  if (todayTrained) {
    document.getElementById('today-text').textContent = '今日のトレーニング完了！';
    document.getElementById('today-done').textContent = '✅ 完了';
    document.getElementById('today-card').style.background = 'linear-gradient(135deg, #2d6a4f, #1b4332)';
    document.getElementById('today-card').style.cursor = 'default';
  } else {
    document.getElementById('today-text').textContent = 'Level ' + nextLevel + ' に挑戦しよう';
    document.getElementById('today-done').textContent = '▶ 開始';
    document.getElementById('today-card').style.background = '';
    document.getElementById('today-card').style.cursor = 'pointer';
  }

  // level cards
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';
  LEVELS.forEach(lv => {
    const prog = state.progress[lv.id];
    const totalQ = lv.questions.length;
    const done = prog.completed.length;
    const isLocked = state.totalQ < lv.unlock;
    const isCompleted = done >= totalQ;

    const pct = Math.round(done / totalQ * 100);
    const card = document.createElement('div');
    card.className = 'level-card' + (isLocked ? ' locked' : '') + (isCompleted ? ' completed' : '');
    card.setAttribute('data-level', lv.id);
    if (!isLocked) card.onclick = () => openLevel(lv.id);

    card.innerHTML = `
      <div class="level-num" style="background:${lv.color}22;color:${lv.color}">${lv.id}</div>
      <div class="level-info">
        <div class="level-name">${lv.emoji} ${lv.name}</div>
        <div class="level-desc">${lv.tag}</div>
        <div class="level-prog">
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${lv.color}"></div></div>
          <div class="prog-text">${done}/${totalQ}</div>
        </div>
      </div>
      <div class="level-lock">${isLocked ? '🔒' : isCompleted ? '✅' : '›'}</div>
    `;
    grid.appendChild(card);
  });
}

function getNextLevel() {
  for (let i = LEVELS.length - 1; i >= 0; i--) {
    if (state.totalQ >= LEVELS[i].unlock) return LEVELS[i].id;
  }
  return 1;
}

function startToday() {
  if (state.lastDate === todayStr()) return;
  openLevel(getNextLevel());
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// INTRO
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function openLevel(lvId) {
  const lv = LEVELS.find(l => l.id === lvId);
  session.levelId = lvId;

  document.getElementById('intro-icon').textContent = lv.emoji;
  document.getElementById('intro-level-label').textContent = 'LEVEL ' + lv.id;
  document.getElementById('intro-title').textContent = lv.name;
  document.getElementById('intro-sub').textContent = lv.intro.sub;

  const pts = document.getElementById('intro-points');
  pts.innerHTML = lv.intro.points.map(p => `
    <div class="intro-point">
      <div class="intro-point-icon">${p.icon}</div>
      <div class="intro-point-text">${p.text}</div>
    </div>
  `).join('');

  showScreen('intro');
}

function startTraining() {
  const lv = LEVELS.find(l => l.id === session.levelId);
  const prog = state.progress[lv.id];

  // pick 3 questions: prioritize not-yet-completed
  const notDone = lv.questions.map((q,i) => i).filter(i => !prog.completed.includes(i));
  const done = lv.questions.map((q,i) => i).filter(i => prog.completed.includes(i));

  let pool = [...notDone];
  while (pool.length < 3 && done.length > 0) {
    const pick = done.splice(Math.floor(Math.random()*done.length), 1)[0];
    pool.push(pick);
  }
  pool = pool.slice(0, 3);
  // shuffle
  pool.sort(() => Math.random() - 0.5);

  session.questions = pool.map(i => ({ ...lv.questions[i], idx: i }));
  session.current = 0;
  session.scores = { ok: 0, so: 0, no: 0 };

  // timer
  session.seconds = 300;
  startTimer();

  // header
  document.getElementById('train-level-label').textContent = 'LEVEL ' + lv.id + ' · ' + lv.tag;
  document.getElementById('train-level-title').textContent = lv.name;

  showScreen('train');
  renderQuestion();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// TIMER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function startTimer() {
  if (session.timerInterval) clearInterval(session.timerInterval);
  session.timerInterval = setInterval(() => {
    session.seconds--;
    updateTimerDisplay();
    if (session.seconds <= 0) {
      clearInterval(session.timerInterval);
    }
  }, 1000);
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const m = Math.floor(Math.abs(session.seconds) / 60);
  const s = Math.abs(session.seconds) % 60;
  const label = (session.seconds < 0 ? '+' : '') + m + ':' + String(s).padStart(2, '0');
  document.getElementById('timer-label').textContent = label;

  const max = 300;
  const circumference = 138.2;
  const elapsed = max - session.seconds;
  const offset = Math.min(circumference, (elapsed / max) * circumference);
  document.getElementById('timer-circle').style.strokeDashoffset = offset;
  document.getElementById('timer-circle').style.stroke =
    session.seconds < 60 ? '#FF6B6B' : session.seconds < 120 ? 'var(--gold)' : 'var(--accent)';
}

function stopTimer() {
  if (session.timerInterval) clearInterval(session.timerInterval);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// QUESTION
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function renderQuestion() {
  const lv = LEVELS.find(l => l.id === session.levelId);
  const q = session.questions[session.current];
  const total = session.questions.length;

  // progress
  const pct = (session.current / total) * 100;
  document.getElementById('q-prog-fill').style.width = pct + '%';
  document.getElementById('q-prog-fill').style.background = lv.color;

  const body = document.getElementById('train-body');

  const scenarioHTML = q.scenario.map(s =>
    `<div class="pill">${s}</div>`
  ).join('');

  body.innerHTML = `
    <div class="q-header">
      <div class="q-type-badge" style="background:${lv.color}22;color:${lv.color}">${q.type}</div>
      <div class="q-num">Q${session.current + 1} / ${total}</div>
    </div>

    <div class="q-card">
      <div class="q-scenario-label">🏪 飲食店の場面</div>
      <div class="q-scenario">${scenarioHTML}</div>
      <div class="q-text">${q.q}</div>
      ${q.hint ? `<div class="q-hint">${q.hint}</div>` : ''}
    </div>

    <div class="answer-area">
      <div class="answer-label">✏️ あなたの答え</div>
      <textarea class="answer-input" id="answer-input" placeholder="ここに考えを書いてみましょう…"></textarea>
    </div>

    <button class="reveal-btn" onclick="revealAnswer()">💡 模範解答を見る</button>

    <div class="answer-reveal" id="answer-reveal">
      <div class="reveal-header">模範解答・解説</div>
      <div class="reveal-text">${q.answer.replace(/\n/g, '<br>')}</div>
      <div class="reveal-key">
        <div class="reveal-key-label">🔑 営業キーワード</div>
        ${q.key}
      </div>
    </div>

    <div class="self-assess" id="self-assess" style="display:none">
      <div class="assess-label">自己評価してください</div>
      <div class="assess-btns">
        <button class="assess-btn ok" onclick="assess('ok')">✅ できた</button>
        <button class="assess-btn so" onclick="assess('so')">🔶 まあまあ</button>
        <button class="assess-btn no" onclick="assess('no')">🔁 もう一回</button>
      </div>
    </div>

    <button class="next-btn" id="next-btn" onclick="nextQuestion()">
      ${session.current + 1 < total ? '次の問題へ →' : 'セッション完了 🎉'}
    </button>

    <div style="height: calc(env(safe-area-inset-bottom) + 20px)"></div>
  `;
}

function revealAnswer() {
  document.getElementById('answer-reveal').classList.add('show');
  document.getElementById('self-assess').style.display = 'block';
  document.querySelector('.reveal-btn').style.display = 'none';
}

function assess(score) {
  session.scores[score]++;

  // mark q as completed
  const q = session.questions[session.current];
  const prog = state.progress[session.levelId];
  if (!prog.completed.includes(q.idx)) {
    prog.completed.push(q.idx);
    state.totalQ++;
  }
  prog[score] = (prog[score] || 0) + 1;

  // update max level
  LEVELS.forEach(lv => {
    if (state.totalQ >= lv.unlock && lv.id > state.maxLevel) {
      state.maxLevel = lv.id;
    }
  });

  saveState();

  // highlight selected
  document.querySelectorAll('.assess-btn').forEach(b => {
    b.style.opacity = '0.4';
    b.style.cursor = 'default';
    b.onclick = null;
  });
  const map = { ok: 0, so: 1, no: 2 };
  document.querySelectorAll('.assess-btn')[map[score]].style.opacity = '1';

  document.getElementById('next-btn').classList.add('show');
}

function nextQuestion() {
  session.current++;
  if (session.current >= session.questions.length) {
    finishSession();
  } else {
    document.getElementById('q-prog-fill').style.width =
      ((session.current / session.questions.length) * 100) + '%';
    renderQuestion();
    document.getElementById('train-body').scrollTop = 0;
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// COMPLETE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const completeMsgs = [
  '「本質を掴む力」は営業の最大の武器です。今日学んだ抽象化を、明日の商談で使ってみましょう。',
  '「相手の言語で話す力」が身についてきています。次は数字を使った具体化を磨きましょう。',
  '課題の根本原因を見抜く「WHY思考」は、提案の深さに直結します。明日も続けましょう！',
  '解決策を素早く出す「提案力」が鍛えられています。PREP法と組み合わせると最強です。',
  'PREP法でスパッと伝える力は、信頼感につながります。毎日少しずつ磨いていきましょう！'
];

function finishSession() {
  stopTimer();
  checkAndUpdateStreak();

  document.getElementById('c-ok').textContent = session.scores.ok;
  document.getElementById('c-so').textContent = session.scores.so;
  document.getElementById('c-no').textContent = session.scores.no;

  const lvIdx = session.levelId - 1;
  document.getElementById('complete-msg-text').textContent = completeMsgs[lvIdx] || completeMsgs[0];

  const total = session.scores.ok + session.scores.so + session.scores.no;
  if (session.scores.ok === total) {
    document.getElementById('complete-icon').textContent = '🏆';
    document.getElementById('complete-title').textContent = '完璧です！';
    document.getElementById('complete-sub').textContent = '全問「できた」！素晴らしい理解力です。';
  } else if (session.scores.ok >= 2) {
    document.getElementById('complete-icon').textContent = '🎉';
    document.getElementById('complete-title').textContent = 'よくできました！';
    document.getElementById('complete-sub').textContent = '確実に力がついています。この調子で続けましょう！';
  } else {
    document.getElementById('complete-icon').textContent = '💪';
    document.getElementById('complete-title').textContent = 'セッション完了！';
    document.getElementById('complete-sub').textContent = '難しい問題も、繰り返しが上達の近道です。明日また挑戦しましょう。';
  }

  showScreen('complete');
}

function confirmBack() {
  if (confirm('トレーニングを中断しますか？')) {
    stopTimer();
    goHome();
  }
}

function goHome() {
  showScreen('home');
  renderHome();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SCREEN
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

loadState();
renderHome();
</script>
